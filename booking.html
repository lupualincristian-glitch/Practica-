<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervă Sejur | Hotel Grand Palace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand text-gold" href="index.html">Grand Palace</a>
        </div>
    </nav>

    <main class="py-5 mt-5">
        <div class="container" style="max-width: 600px;">
            <h1 class="text-center mb-4">Rezervare Online</h1>
            <form id="bookingForm" class="bg-white p-4 rounded shadow-sm">
                <div class="mb-3">
                    <label class="form-label">Nume Complet</label>
                    <input type="text" id="bookingName" class="form-select form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Tip Cameră</label>
                    <select id="roomType" class="form-select">
                        <option value="120">Standard Single (120€/noapte)</option>
                        <option value="180">Standard Double (180€/noapte)</option>
                        <option value="290">Junior Suite (290€/noapte)</option>
                    </select>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">Check-in</label>
                        <input type="date" id="checkIn" class="form-control" required>
                    </div>
                    <div class="col">
                        <label class="form-label">Check-out</label>
                        <input type="date" id="checkOut" class="form-control" required>
                    </div>
                </div>
                
                <div class="p-3 bg-light rounded text-center mb-3">
                    <span class="fw-bold">Preț Total Estimat: </span>
                    <span id="totalPrice" class="text-gold fs-4 fw-bold">0 €</span>
                </div>

                <button type="submit" class="btn btn-gold w-100 py-2">Trimite Rezervarea</button>
            </form>
        </div>
    </main>

    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header"><h5>Rezervare Înregistrată!</h5></div>
                <div class="modal-body">Vă mulțumim. Cererea dumneavoastră a fost procesată cu succes.</div>
                <div class="modal-footer"><button class="btn btn-dark" data-bs-dismiss="modal">Închide</button></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/booking.js"></script>
</body>
</html>
