<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie Foto | Hotel Grand Palace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .gallery-img { cursor: pointer; transition: transform 0.2s; }
        .gallery-img:hover { transform: scale(1.03); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand text-gold" href="index.html">Grand Palace</a>
        </div>
    </nav>

    <main class="py-5 mt-5">
        <div class="container">
            <h1 class="text-center mb-4">Galeria Noastră Vizuală</h1>
            
            <div class="row g-3" id="galleryContainer">
                <div class="col-md-4"><img src="img/gallery/1.jpg" class="img-fluid gallery-img rounded" alt="Exterior Hotel"></div>
                <div class="col-md-4"><img src="img/gallery/2.jpg" class="img-fluid gallery-img rounded" alt="Restaurant Interior"></div>
                <div class="col-md-4"><img src="img/gallery/3.jpg" class="img-fluid gallery-img rounded" alt="Zona de Relaxare"></div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-body text-center p-0">
                    <img src="" id="lightboxImg" class="img-fluid rounded" alt="Preview">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/gallery.js"></script>
</body>
</html>
