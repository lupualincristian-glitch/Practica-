<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facilități | Hotel Grand Palace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand text-gold" href="index.html">Grand Palace</a>
        </div>
    </nav>

    <main class="py-5 mt-5">
        <div class="container">
            <h1 class="text-center mb-5">Servicii & Facilități</h1>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <img src="img/facilities/spa.jpg" class="card-img-top" alt="Spa">
                        <div class="card-body">
                            <h3>Centru Spa de Lux</h3>
                            <p>Program: 08:00 - 22:00. Saună umedă/uscată, masaj terapeutic.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <img src="img/facilities/restaurant.jpg" class="card-img-top" alt="Restaurant">
                        <div class="card-body">
                            <h3>Restaurant Royal</h3>
                            <p>Program: 07:00 - 23:00. Bucătărie internațională și finisaje fine dine.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <img src="img/facilities/pool.jpg" class="card-img-top" alt="Pool">
                        <div class="card-body">
                            <h3>Piscină Olimpică</h3>
                            <p>Program: 06:00 - 21:00. Apă încălzită la 28°C.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
