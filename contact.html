<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Hotel Grand Palace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="py-5 mt-5">
        <div class="container">
            <h1 class="text-center mb-5">Contactați-ne</h1>
            <div class="row g-5">
                <div class="col-md-6">
                    <h3>Informații Contact</h3>
                    <p>Adresă: Cahul, Republica Moldova</p>
                    <p>Email: contact@grandpalace.md</p>
                    <div class="ratio ratio-16x9 bg-secondary text-white d-flex align-items-center justify-content-center rounded">
                        <span>[Hartă Interactivă Google Maps]</span>
                    </div>
                </div>
                <div class="col-md-6">
                    <form id="contactForm" class="p-4 bg-white rounded shadow-sm">
                        <div class="mb-3"><label class="form-label">Nume</label><input type="text" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Mesaj</label><textarea class="form-control" rows="4" required></textarea></div>
                        <button type="submit" class="btn btn-gold w-100">Trimite Mesaj</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
